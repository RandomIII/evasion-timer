name: Build APK

# Se lance à chaque push, et manuellement depuis l'onglet Actions (bouton "Run workflow").
on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer le JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Installer le SDK Android
        uses: android-actions/setup-android@v3

      - name: Télécharger la plateforme et les build-tools
        run: yes | sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools" > /dev/null

      - name: Générer le wrapper Gradle puis compiler
        run: |
          gradle wrapper --gradle-version 8.7
          ./gradlew assembleDebug --stacktrace

      - name: Publier l'APK
        uses: actions/upload-artifact@v4
        with:
          name: evasion-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
